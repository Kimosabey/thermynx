<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:16px;">Shadow system · brand-tinted · never neutral</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:14px 6px 22px;">
    <div style="background:#FFF;border-radius:12px;height:80px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 1px 3px rgba(31,63,254,0.06),0 1px 2px rgba(31,63,254,0.04);">
      <div style="font-size:12px;font-weight:600;">sm</div>
      <div class="mono muted" style="font-size:10px;">card resting</div>
    </div>
    <div style="background:#FFF;border-radius:12px;height:80px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 4px 12px rgba(31,63,254,0.08),0 2px 4px rgba(31,63,254,0.04);">
      <div style="font-size:12px;font-weight:600;">md</div>
      <div class="mono muted" style="font-size:10px;">dropdown</div>
    </div>
    <div style="background:#FFF;border-radius:12px;height:80px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 8px 24px rgba(31,63,254,0.1),0 4px 8px rgba(31,63,254,0.06);">
      <div style="font-size:12px;font-weight:600;">lg</div>
      <div class="mono muted" style="font-size:10px;">hover lift</div>
    </div>
    <div style="background:#FFF;border-radius:12px;height:80px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 16px 40px rgba(31,63,254,0.12);">
      <div style="font-size:12px;font-weight:600;">xl</div>
      <div class="mono muted" style="font-size:10px;">overlay</div>
    </div>
    <div style="background:#1F3FFE;color:#fff;border-radius:12px;height:80px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 4px 20px rgba(31,63,254,0.32);">
      <div style="font-size:12px;font-weight:700;">brand</div>
      <div class="mono" style="font-size:10px;opacity:0.7;">primary btn</div>
    </div>
    <div style="background:#FFF;border-radius:12px;height:80px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 1px 3px rgba(29,29,33,0.06),0 4px 16px rgba(31,63,254,0.04);">
      <div style="font-size:12px;font-weight:600;">card</div>
      <div class="mono muted" style="font-size:10px;">GlassCard</div>
    </div>
  </div>
</body></html>
