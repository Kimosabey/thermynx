<!doctype html><html><head><meta charset="utf-8"><title>Status colors</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:14px;">Status colors · in-data only · never in chrome</p>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
    <div style="background:rgba(5,150,105,0.1);border:1px solid rgba(5,150,105,0.25);border-radius:12px;padding:14px;">
      <div style="width:24px;height:24px;border-radius:8px;background:#059669;margin-bottom:10px;"></div>
      <div style="font-size:11px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:0.08em;">Good</div>
      <div class="mono muted" style="font-size:10px;margin-top:3px;">#059669</div>
    </div>
    <div style="background:rgba(217,119,6,0.1);border:1px solid rgba(217,119,6,0.25);border-radius:12px;padding:14px;">
      <div style="width:24px;height:24px;border-radius:8px;background:#D97706;margin-bottom:10px;"></div>
      <div style="font-size:11px;font-weight:700;color:#D97706;text-transform:uppercase;letter-spacing:0.08em;">Warn</div>
      <div class="mono muted" style="font-size:10px;margin-top:3px;">#D97706</div>
    </div>
    <div style="background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.25);border-radius:12px;padding:14px;">
      <div style="width:24px;height:24px;border-radius:8px;background:#DC2626;margin-bottom:10px;"></div>
      <div style="font-size:11px;font-weight:700;color:#DC2626;text-transform:uppercase;letter-spacing:0.08em;">Bad</div>
      <div class="mono muted" style="font-size:10px;margin-top:3px;">#DC2626</div>
    </div>
    <div style="background:rgba(31,63,254,0.07);border:1px solid rgba(31,63,254,0.22);border-radius:12px;padding:14px;">
      <div style="width:24px;height:24px;border-radius:8px;background:#1F3FFE;margin-bottom:10px;"></div>
      <div style="font-size:11px;font-weight:700;color:#1F3FFE;text-transform:uppercase;letter-spacing:0.08em;">Info</div>
      <div class="mono muted" style="font-size:10px;margin-top:3px;">#1F3FFE</div>
    </div>
  </div>
</body></html>
