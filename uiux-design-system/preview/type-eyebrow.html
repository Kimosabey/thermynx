<!doctype html><html><head><meta charset="utf-8"><title>Eyebrow / overline</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:16px;">Overline labels · 10px · 700 · uppercase · 0.10em tracked</p>
  <div class="card-surface" style="display:flex;flex-direction:column;gap:14px;">
    <div>
      <p class="eyebrow" style="margin:0 0 6px;">Equipment Overview</p>
      <span style="font-size:13px;color:var(--text-primary);">Chiller 1 · 62.4% load</span>
    </div>
    <div>
      <p class="eyebrow" style="margin:0 0 6px;">Reasoning Trace</p>
      <span style="font-size:13px;color:var(--text-primary);">step 3 · compute_efficiency</span>
    </div>
    <div>
      <p class="eyebrow" style="margin:0 0 6px;">Conversation Thread</p>
      <span style="font-size:13px;color:var(--text-primary);">Memory off</span>
    </div>
  </div>
  <p class="muted" style="font-size:11px;margin-top:14px;line-height:1.6;">Repeated 50+ times across the product to label every section, KPI, and chart axis. Always <span class="mono">color: text.muted</span>.</p>
</body></html>
