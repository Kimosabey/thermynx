<!doctype html><html><head><meta charset="utf-8"><title>Mono &amp; code</title><link rel="stylesheet" href="_card.css"></head>

  <p class="eyebrow" style="margin-bottom:14px;">Mono · JetBrains Mono · for tool args, JSON traces, tokens</p>
  <div class="card-surface" style="padding:14px;background:#EFF0FF;border:1px solid var(--border-subtle);">

  <p style="font-size:13px;color:var(--text-primary);margin-top:14px;line-height:1.7;">Inline code like <code>kW/TR</code> or <code>--accent-primary</code> uses brand-tinted background <span class="mono muted" style="font-size:10px;">rgba(31,63,254,0.10)</span> and brand-color text.</p>
