<!doctype html><html><head><meta charset="utf-8"><title>Neutral scale</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:14px;">Neutral scale · warm-cool grays (not pure)</p>
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:8px;">
    <div class="sw" style="background:#FFFFFF;height:88px;"><span class="sw-label" style="color:#1D1D21;">0</span></div>
    <div class="sw" style="background:#F1F1F1;height:88px;"><span class="sw-label" style="color:#1D1D21;">50</span></div>
    <div class="sw" style="background:#CCCCCF;height:88px;"><span class="sw-label" style="color:#1D1D21;">100</span></div>
    <div class="sw" style="background:#A5A5AA;height:88px;"><span class="sw-label" style="color:#FFFFFF;">200</span></div>
    <div class="sw" style="background:#808087;height:88px;"><span class="sw-label" style="color:#FFFFFF;">300</span></div>
    <div class="sw" style="background:#5C5C65;height:88px;"><span class="sw-label" style="color:#FFFFFF;">400</span></div>
    <div class="sw" style="background:#3B3B42;height:88px;"><span class="sw-label" style="color:#FFFFFF;">800</span></div>
    <div class="sw" style="background:#1D1D21;height:88px;"><span class="sw-label" style="color:#FFFFFF;">900 · text</span></div>
  </div>
  <p class="muted" style="font-size:11px;margin-top:14px;line-height:1.6;">Cool-gray ramp with a hint of warmth. <span class="mono">#1D1D21</span> is the primary text color (15.5:1 on canvas — AAA).</p>
</body></html>
