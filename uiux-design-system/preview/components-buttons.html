<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css">
<style>
  .btn { font-family: var(--font-body); font-size: 13px; font-weight: 600; border-radius: 10px; padding: 8px 18px; cursor: pointer; transition: all 0.18s ease; border: none; letter-spacing: -0.01em; }
  .btn-solid { background:#1F3FFE; color:#fff; }
  .btn-solid:hover { background:#0123B4; box-shadow:0 6px 24px rgba(31,63,254,0.35); transform: translateY(-1px); }
  .btn-outline { background:transparent; color:#1D1D21; border:1.5px solid #989DFF; }
  .btn-outline:hover { border-color:#1F3FFE; color:#1F3FFE; background:#EFF0FF; }
  .btn-ghost { background:transparent; color:#3B3B42; }
  .btn-ghost:hover { background:#EFF0FF; color:#1D1D21; }
  .btn-glass { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.88); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.12); }
  .btn-glass:hover { background:rgba(255,255,255,0.14); border-color:rgba(31,63,254,0.5); transform: translateY(-1px); }
</style></head>
<body>
  <p class="eyebrow" style="margin-bottom:14px;">Buttons · radius 10 · weight 600 · 180ms ease</p>
  <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
    <button class="btn btn-solid">Analyze</button>
    <button class="btn btn-outline">New thread</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-solid" disabled style="opacity:0.5;cursor:not-allowed;">Disabled</button>
  </div>
  <div style="margin-top:12px;background:#06091A;padding:14px;border-radius:12px;display:flex;gap:10px;align-items:center;">
    <span style="color:rgba(255,255,255,0.45);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;flex-shrink:0;">On dark</span>
    <button class="btn btn-glass">Stop</button>
    <button class="btn btn-glass">Reasoning</button>
  </div>
  <p class="muted" style="font-size:11px;margin-top:12px;line-height:1.6;">Primary lifts <span class="mono">-1px</span> on hover and casts a brand-tinted shadow. Press collapses back and deepens to <span class="mono">brand.700</span>. Glass variant is reserved for dark surfaces.</p>
</body></html>
