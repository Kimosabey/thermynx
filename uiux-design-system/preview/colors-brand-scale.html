<!doctype html><html><head><meta charset="utf-8"><title>Brand scale</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:14px;">Brand scale · electric blue · WCAG AAA on white at 500+</p>
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:8px;">
    <div class="sw" style="background:#EFF0FF;height:88px;"><span class="sw-label" style="color:#1D1D21;">50</span></div>
    <div class="sw" style="background:#C7C9FF;height:88px;"><span class="sw-label" style="color:#1D1D21;">100</span></div>
    <div class="sw" style="background:#989DFF;height:88px;"><span class="sw-label" style="color:#1D1D21;">200</span></div>
    <div class="sw" style="background:#6671FF;height:88px;"><span class="sw-label" style="color:#FFFFFF;">300</span></div>
    <div class="sw" style="background:#3D52FE;height:88px;"><span class="sw-label" style="color:#FFFFFF;">400</span></div>
    <div class="sw" style="background:#1F3FFE;height:88px;border:none;outline:2px solid rgba(31,63,254,0.18);outline-offset:-2px;"><span class="sw-label" style="color:#FFFFFF;">500 · primary</span></div>
    <div class="sw" style="background:#0123B4;height:88px;"><span class="sw-label" style="color:#FFFFFF;">600</span></div>
    <div class="sw" style="background:#000F64;height:88px;"><span class="sw-label" style="color:#FFFFFF;">700</span></div>
  </div>
  <p class="muted" style="font-size:11px;margin-top:14px;line-height:1.6;">Primary <span class="mono">#1F3FFE</span> drives every primary action, focus ring, link, active nav state, and chart line. The full product feels like one hue.</p>
</body></html>
