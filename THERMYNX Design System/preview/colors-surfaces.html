<!doctype html><html><head><meta charset="utf-8"><title>Semantic surfaces</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:14px;">Semantic surfaces · canvas / surface / elevated / sidebar</p>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
    <div class="sw" style="background:#EFF0FF;height:110px;display:flex;flex-direction:column;justify-content:space-between;padding:10px;">
      <span style="font-size:10px;font-weight:700;color:#1D1D21;text-transform:uppercase;letter-spacing:0.08em;">bg.canvas</span>
      <span class="mono" style="font-size:10px;color:#5C5C65;">#EFF0FF</span>
    </div>
    <div class="sw" style="background:#FFFFFF;height:110px;display:flex;flex-direction:column;justify-content:space-between;padding:10px;">
      <span style="font-size:10px;font-weight:700;color:#1D1D21;text-transform:uppercase;letter-spacing:0.08em;">bg.surface</span>
      <span class="mono" style="font-size:10px;color:#5C5C65;">#FFFFFF</span>
    </div>
    <div class="sw" style="background:#EFF0FF;height:110px;display:flex;flex-direction:column;justify-content:space-between;padding:10px;border-color:rgba(31,63,254,0.28);">
      <span style="font-size:10px;font-weight:700;color:#1D1D21;text-transform:uppercase;letter-spacing:0.08em;">bg.elevated</span>
      <span class="mono" style="font-size:10px;color:#5C5C65;">#EFF0FF · hover</span>
    </div>
    <div class="sw" style="background:#06091A;height:110px;display:flex;flex-direction:column;justify-content:space-between;padding:10px;border:none;">
      <span style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.88);text-transform:uppercase;letter-spacing:0.08em;">bg.sidebar</span>
      <span class="mono" style="font-size:10px;color:rgba(255,255,255,0.45);">#06091A</span>
    </div>
  </div>
  <p class="muted" style="font-size:11px;margin-top:14px;line-height:1.6;">Canvas is brand-tinted off-white. Surfaces are pure white. Sidebar is the only dark surface in the product.</p>
</body></html>
