<!doctype html><html><head><meta charset="utf-8"><title>Motion</title><link rel="stylesheet" href="_card.css">
<style>
  @keyframes pulse { 0%{transform:scale(1);opacity:1;} 50%{transform:scale(1.8);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  @keyframes thinking { 0%,100%{transform:translateY(0);opacity:0.4;} 50%{transform:translateY(-5px);opacity:1;} }
  @keyframes shimmer { 0%{transform:translateX(-100%);} 100%{transform:translateX(100%);} }
  .pulse-halo { animation: pulse 2s ease-in-out infinite; }
  .think-dot { animation: thinking 0.9s ease-in-out infinite; }
  .shimmer-bar { animation: shimmer 1.6s ease-in-out infinite; }
</style></head>
<body>
  <p class="eyebrow" style="margin-bottom:16px;">Motion · spring out · stagger 60ms · no bounces</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
    <div class="card-surface" style="padding:14px;text-align:center;">
      <div style="position:relative;width:14px;height:14px;margin:14px auto 18px;">
        <div class="pulse-halo" style="position:absolute;inset:0;border-radius:50%;background:#059669;opacity:0.4;"></div>
        <div style="position:absolute;inset:0;border-radius:50%;background:#059669;"></div>
      </div>
      <div style="font-size:11px;font-weight:600;">Status pulse</div>
      <div class="mono muted" style="font-size:10px;margin-top:3px;">2s · ease-in-out</div>
    </div>
    <div class="card-surface" style="padding:14px;text-align:center;">
      <div style="display:flex;gap:6px;justify-content:center;align-items:center;height:30px;margin:14px 0 14px;">
        <div class="think-dot" style="width:6px;height:6px;border-radius:50%;background:#1F3FFE;"></div>
        <div class="think-dot" style="width:6px;height:6px;border-radius:50%;background:#1F3FFE;animation-delay:0.15s;"></div>
        <div class="think-dot" style="width:6px;height:6px;border-radius:50%;background:#1F3FFE;animation-delay:0.3s;"></div>
      </div>
      <div style="font-size:11px;font-weight:600;">Thinking dots</div>
      <div class="mono muted" style="font-size:10px;margin-top:3px;">0.9s · 0.15 stagger</div>
    </div>
    <div class="card-surface" style="padding:14px;text-align:center;">
      <div style="position:relative;width:100%;height:14px;background:#EFF0FF;border-radius:6px;overflow:hidden;margin:18px 0 14px;">
        <div class="shimmer-bar" style="position:absolute;top:0;bottom:0;width:60%;background:linear-gradient(90deg,transparent,rgba(199,201,255,0.85),transparent);"></div>
      </div>
      <div style="font-size:11px;font-weight:600;">Skeleton shimmer</div>
      <div class="mono muted" style="font-size:10px;margin-top:3px;">1.6s · ease-in-out</div>
    </div>
  </div>
  <div style="margin-top:14px;padding:12px;background:#FFF;border:1px solid var(--border-subtle);border-radius:12px;">
    <div style="display:flex;gap:18px;font-size:11px;">
      <div><span class="mono muted">page-fade</span> 220ms <span class="muted">cubic-bezier(0.25,0.46,0.45,0.94)</span></div>
      <div><span class="mono muted">card-entrance</span> 420ms <span class="muted">stagger 60ms</span></div>
      <div><span class="mono muted">kpi-countup</span> 1.1s <span class="muted">out-expo</span></div>
    </div>
  </div>
</body></html>
