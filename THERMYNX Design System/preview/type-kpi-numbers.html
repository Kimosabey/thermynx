<!doctype html><html><head><meta charset="utf-8"><title>KPI numbers</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:16px;">KPI numerals · heading family · 800 · -0.03em · tabular-nums</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
    <div class="card-surface" style="padding:18px;">
      <p class="eyebrow" style="margin:0 0 8px;">Chiller 1 kW/TR</p>
      <div style="font-family:var(--font-heading);font-size:28px;font-weight:800;color:#10b981;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;">0.612</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">Efficiency</div>
    </div>
    <div class="card-surface" style="padding:18px;">
      <p class="eyebrow" style="margin:0 0 8px;">CH1 Load</p>
      <div style="font-family:var(--font-heading);color:var(--text-primary);letter-spacing:-0.03em;font-variant-numeric:tabular-nums;">
        <span style="font-size:28px;font-weight:800;">62.4</span><span style="font-size:16px;color:var(--text-muted);font-weight:500;"> %</span>
      </div>
      <div style="font-size:11px;color:#059669;font-weight:600;margin-top:6px;">↑ 4.1% vs yesterday</div>
    </div>
    <div class="card-surface" style="padding:18px;">
      <p class="eyebrow" style="margin:0 0 8px;">CHW Supply</p>
      <div style="font-family:var(--font-heading);color:var(--text-primary);letter-spacing:-0.03em;font-variant-numeric:tabular-nums;">
        <span style="font-size:28px;font-weight:800;">7.4</span><span style="font-size:16px;color:var(--text-muted);font-weight:500;"> °C</span>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">Ambient 28.5 °C</div>
    </div>
  </div>
</body></html>
