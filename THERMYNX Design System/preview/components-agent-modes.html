<!doctype html><html><head><meta charset="utf-8"><title>Agent mode cards</title><link rel="stylesheet" href="_card.css">
<style>
  .mode {
    position: relative;
    background: #FFFFFF;
    border: 1px solid #E1E3FF;
    border-radius: 16px;
    padding: 16px 14px 14px;
    cursor: pointer;
    transition:
      border-color 180ms var(--ease-spring),
      transform 180ms var(--ease-spring),
      box-shadow 220ms var(--ease-spring),
      background 180ms var(--ease-spring);
    box-shadow: 0 1px 2px rgba(31,63,254,0.04);
    isolation: isolate;
  }
  .mode::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    padding: 1px;
    background: linear-gradient(180deg, var(--c, #C7C9FF) 0%, transparent 60%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: 0;
    transition: opacity 180ms var(--ease-spring);
    pointer-events: none;
  }
  .mode__glow {
    position: absolute;
    inset: -40% 30% auto 30%;
    height: 64px;
    background: radial-gradient(ellipse at top, var(--c-glow, transparent), transparent 70%);
    opacity: 0;
    transition: opacity 220ms var(--ease-spring);
    pointer-events: none;
    z-index: -1;
  }
  .mode:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(31,63,254,0.08);
    border-color: transparent;
  }
  .mode:hover::before { opacity: 1; }
  .mode:hover .mode__glow { opacity: 0.7; }
  .mode.is-selected {
    background: linear-gradient(180deg, color-mix(in srgb, var(--c) 8%, #FFFFFF) 0%, #FFFFFF 70%);
    border-color: transparent;
  }
  .mode.is-selected::before { opacity: 1; }
  .mode.is-selected .mode__glow { opacity: 1; }

  .mode__icon {
    width: 36px; height: 36px;
    border-radius: 11px;
    display: inline-flex; align-items: center; justify-content: center;
    color: #FFF;
    background: linear-gradient(135deg, var(--c) 0%, var(--c-deep, var(--c)) 100%);
    box-shadow: 0 6px 14px var(--c-shadow, rgba(31,63,254,0.25));
    margin-bottom: 12px;
  }
  .mode__title { font-weight: 700; font-size: 13px; letter-spacing: -0.01em; color: #1D1D21; line-height: 1.2; }
  .mode__tag { font-size: 11px; color: #808087; line-height: 1.45; margin-top: 4px; }
  .mode__chev {
    position: absolute; top: 14px; right: 14px;
    width: 18px; height: 18px; border-radius: 9999px;
    background: var(--c); color: #FFF;
    display: inline-flex; align-items: center; justify-content: center;
    opacity: 0; transform: translateX(-2px) scale(0.85);
    transition: all 180ms var(--ease-spring);
  }
  .mode.is-selected .mode__chev { opacity: 1; transform: translateX(0) scale(1); }
</style></head>
<body>
  <p class="eyebrow" style="margin-bottom:14px;">Agent mode cards · 5 specialists · color-keyed glyph tile + radial glow on select</p>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">

    <button class="mode is-selected" style="--c:#1F3FFE;--c-deep:#0123B4;--c-glow:rgba(31,63,254,0.32);--c-shadow:rgba(31,63,254,0.32);">
      <span class="mode__glow"></span>
      <span class="mode__icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M11 8v3"/><path d="M11 14h.01"/></svg>
      </span>
      <span class="mode__chev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
      <div class="mode__title">Investigator</div>
      <div class="mode__tag">Deep-dive any equipment issue</div>
    </button>

    <button class="mode" style="--c:#10b981;--c-deep:#047857;--c-glow:rgba(16,185,129,0.28);--c-shadow:rgba(16,185,129,0.28);">
      <span class="mode__glow"></span>
      <span class="mode__icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </span>
      <span class="mode__chev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
      <div class="mode__title">Optimizer</div>
      <div class="mode__tag">Cut energy use today</div>
    </button>

    <button class="mode" style="--c:#7c3aed;--c-deep:#5b21b6;--c-glow:rgba(124,58,237,0.28);--c-shadow:rgba(124,58,237,0.28);">
      <span class="mode__glow"></span>
      <span class="mode__icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="m9 16 2 2 4-4"/></svg>
      </span>
      <span class="mode__chev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
      <div class="mode__title">Daily Brief</div>
      <div class="mode__tag">Shift handover briefing</div>
    </button>

    <button class="mode" style="--c:#f59e0b;--c-deep:#b45309;--c-glow:rgba(245,158,11,0.28);--c-shadow:rgba(245,158,11,0.30);">
      <span class="mode__glow"></span>
      <span class="mode__icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/></svg>
      </span>
      <span class="mode__chev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
      <div class="mode__title">Root Cause</div>
      <div class="mode__tag">Diagnose a fault</div>
    </button>

    <button class="mode" style="--c:#f97316;--c-deep:#c2410c;--c-glow:rgba(249,115,22,0.28);--c-shadow:rgba(249,115,22,0.30);">
      <span class="mode__glow"></span>
      <span class="mode__icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </span>
      <span class="mode__chev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
      <div class="mode__title">Maintenance</div>
      <div class="mode__tag">AI-built maintenance plan</div>
    </button>

  </div>
</body></html>
