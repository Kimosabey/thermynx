<!doctype html><html><head><meta charset="utf-8"><title>Page header</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:14px;">PageHeader · brand-gradient icon tile + title + subtitle + actions</p>
  <div style="background:#FFF;border:1px solid #C7C9FF;border-radius:16px;padding:22px;box-shadow:var(--shadow-card);">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;">
      <div style="display:flex;align-items:flex-start;gap:14px;flex:1;min-width:240px;">
        <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg, #1F3FFE, #000F64);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(31,63,254,0.3);color:white;flex-shrink:0;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/></svg>
        </div>
        <div style="min-width:0;flex:1;">
          <h1 style="font-family:var(--font-heading);font-weight:800;font-size:24px;letter-spacing:-0.03em;line-height:1.15;color:#1D1D21;margin:0;">AI Agents</h1>
          <p style="color:#808087;margin:4px 0 0;font-size:13px;line-height:1.45;">
            Autonomous HVAC intelligence — 5 specialist agents powered by
            <span style="color:#1F3FFE;font-weight:600;">qwen2.5:14b</span>
          </p>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button style="background:transparent;color:#1D1D21;border:1.5px solid #989DFF;border-radius:10px;font-size:13px;font-weight:600;padding:8px 16px;cursor:pointer;">Settings</button>
        <button style="background:#1F3FFE;color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;padding:8px 18px;cursor:pointer;">Run agent</button>
      </div>
    </div>
  </div>
</body></html>
