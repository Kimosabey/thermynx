<!doctype html><html><head><meta charset="utf-8"><title>Badges &amp; pills</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:14px;">Badges · 6px radius · uppercase · 10px / weight 700</p>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
    <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(5,150,105,0.1);color:#059669;border:1px solid rgba(5,150,105,0.25);letter-spacing:0.04em;">RUNNING</span>
    <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:#EFF0FF;color:#808087;border:1px solid #C7C9FF;letter-spacing:0.04em;">STANDBY</span>
    <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25);letter-spacing:0.04em;">CRITICAL</span>
    <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);letter-spacing:0.04em;">WARNING</span>
    <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(31,63,254,0.1);color:#1F3FFE;border:1px solid rgba(31,63,254,0.2);letter-spacing:0.04em;">qwen2.5:14b</span>
    <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:#FFF;color:#808087;border:1px solid #C7C9FF;letter-spacing:0.04em;">3.4s</span>
  </div>
  <p class="eyebrow" style="margin:18px 0 10px;">Z-score pill · anomaly metric</p>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
    <span style="display:inline-flex;align-items:center;gap:4px;background:rgba(245,158,11,0.18);border:1px solid rgba(245,158,11,0.4);border-radius:9999px;padding:2px 9px;font-size:10px;font-weight:700;color:#f59e0b;font-variant-numeric:tabular-nums;">+3.2σ</span>
    <span style="display:inline-flex;align-items:center;gap:4px;background:rgba(249,115,22,0.18);border:1px solid rgba(249,115,22,0.4);border-radius:9999px;padding:2px 9px;font-size:10px;font-weight:700;color:#f97316;font-variant-numeric:tabular-nums;">+4.1σ</span>
    <span style="display:inline-flex;align-items:center;gap:4px;background:rgba(239,68,68,0.18);border:1px solid rgba(239,68,68,0.4);border-radius:9999px;padding:2px 9px;font-size:10px;font-weight:700;color:#ef4444;font-variant-numeric:tabular-nums;">-5.6σ</span>
  </div>
</body></html>
