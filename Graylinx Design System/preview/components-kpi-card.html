<!doctype html><html><head><meta charset="utf-8"><title>KPI card</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:14px;">KpiCard · operations metric tile</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
    <div style="background:#FFF;border:1px solid #C7C9FF;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(29,29,33,0.06), 0 4px 16px rgba(31,63,254,0.04);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
        <span style="font-size:11px;font-weight:700;color:#808087;text-transform:uppercase;letter-spacing:0.08em;line-height:1.25;">Chiller 1 kW/TR</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#808087" stroke-width="1.75" opacity="0.45"><path d="M2 12h2l3-9 4 18 3-12 2 6h6"/></svg>
      </div>
      <div style="display:flex;align-items:baseline;gap:4px;">
        <span style="font-family:var(--font-heading);font-size:26px;font-weight:800;color:#10b981;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;">0.612</span>
      </div>
      <div style="font-size:11px;color:#808087;margin-top:6px;">Efficiency · good</div>
    </div>
    <div style="background:#FFF;border:1px solid #C7C9FF;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(29,29,33,0.06), 0 4px 16px rgba(31,63,254,0.04);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
        <span style="font-size:11px;font-weight:700;color:#808087;text-transform:uppercase;letter-spacing:0.08em;">CH2 Load</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:4px;">
        <span style="font-family:var(--font-heading);font-size:26px;font-weight:800;color:#1F3FFE;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;">62.4</span>
        <span style="font-size:14px;font-weight:500;color:#808087;">%</span>
      </div>
      <div style="display:flex;gap:6px;font-size:11px;margin-top:6px;"><span style="color:#059669;font-weight:600;">↑ 4.1%</span><span style="color:#808087;">vs yesterday</span></div>
    </div>
    <div style="background:#FFF;border:1px solid #C7C9FF;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(29,29,33,0.06), 0 4px 16px rgba(31,63,254,0.04);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
        <span style="font-size:11px;font-weight:700;color:#808087;text-transform:uppercase;letter-spacing:0.08em;">Ambient</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:4px;">
        <span style="font-family:var(--font-heading);font-size:26px;font-weight:800;color:#1F3FFE;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;">28.5</span>
        <span style="font-size:14px;font-weight:500;color:#808087;">°C</span>
      </div>
      <div style="font-size:11px;color:#808087;margin-top:6px;">Plant outdoor</div>
    </div>
  </div>
</body></html>
