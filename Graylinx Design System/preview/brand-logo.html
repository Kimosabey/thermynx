<!doctype html><html><head><meta charset="utf-8"><title>Logo lockups</title><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow" style="margin-bottom:14px;">Logo lockups · Graylinx primary wordmark · HVAC intelligence</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <!-- Sidebar lockup (live in product) -->
    <div style="background:#06091A;border-radius:14px;padding:22px 20px;display:flex;align-items:center;gap:12px;">
      <div style="width:38px;height:38px;border-radius:10px;background:#FFF;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px rgba(5,17,242,0.2), 0 4px 12px rgba(5,17,242,0.25);">
        <img src="../assets/logo.png" alt="Graylinx" style="width:32px;height:auto;"/>
      </div>
      <div>
        <div style="font-family:var(--font-heading);font-weight:800;font-size:16px;color:#FFF;letter-spacing:-0.02em;line-height:1.1;">Graylinx</div>
        <div style="font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:0.14em;text-transform:uppercase;margin-top:2px;">HVAC intelligence</div>
      </div>
    </div>
    <!-- Wordmark on light -->
    <div style="background:#FFF;border:1px solid #C7C9FF;border-radius:14px;padding:22px 20px;display:flex;align-items:center;gap:14px;">
      <img src="../assets/logo.png" alt="Graylinx" style="width:78px;height:auto;"/>
    </div>
  </div>
  <p class="muted" style="font-size:11px;margin-top:14px;line-height:1.6;">In product, the glyph sits inside a 34×34 white tile on the dark sidebar. The wordmark color is the brand-primary blue (<span class="mono">#1F3FFE</span> / legacy <span class="mono">#0511F2</span>).</p>
</body></html>
