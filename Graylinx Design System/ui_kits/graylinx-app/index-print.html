<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280, initial-scale=1" />
    <title>Graylinx · UI Kit · Print</title>
    <link rel="stylesheet" href="tokens.css" />
    <style>
      /* ── Print page model — A4 landscape, 1cm margin ─────────── */
      @page { size: A4 landscape; margin: 1cm; }

      html, body {
        background: #FFFFFF;
        color-scheme: light;
      }

      /* Each screen on its own page */
      .print-page {
        background: var(--bg-canvas);
        break-after: page;
        page-break-after: always;
        break-inside: avoid;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .print-page:last-child { break-after: auto; page-break-after: auto; }

      /* Page header */
      .print-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 24px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border-subtle);
      }
      .print-brand { display: inline-flex; align-items: center; gap: 12px; }
      .print-mark {
        width: 32px; height: 32px; border-radius: 8px;
        background: #1F3FFE;
        display: inline-flex; align-items: center; justify-content: center;
        box-shadow: 0 2px 6px rgba(31,63,254,0.30);
      }
      .print-mark img { width: 22px; filter: brightness(0) invert(1); }
      .print-brand-name {
        display: block;
        font-family: var(--font-heading);
        font-weight: 800; font-size: 15px;
        letter-spacing: -0.02em; color: #1D1D21; line-height: 1.1;
      }
      .print-brand-sub {
        display: block;
        font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase;
        color: var(--text-muted); margin-top: 2px; font-weight: 600;
      }
      .print-pagenum {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.05em;
      }
      .print-body { flex: 1; }

      /* ── Defensive print rules ───────────────────────────────── */
      @media print {
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        html, body { background: #FFFFFF; }
        /* Kill all animations + hover-state transforms in print */
        *, *::before, *::after {
          animation: none !important;
          transition: none !important;
        }
        /* Hide any nav drawer/toggle remnants if they slip in */
        .app-shell { display: block !important; }
      }
    </style>
  </head>
