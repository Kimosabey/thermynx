global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alertmanager — receives firing alerts from rule_files ─────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ── Alert + recording rules ───────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/prometheus.alerts.yml

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:
  # Graylinx FastAPI backend — runs on host machine, not in docker
  - job_name: thermynx-api
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
    scrape_interval: 10s
