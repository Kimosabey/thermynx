<!DOCTYPE html>
<html lang="en" data-brand="thermynx">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Graylinx AI Operations Intelligence Platform — Unicharm Facility HVAC Analytics" />
  <meta name="theme-color" content="#1F3FFE" />
  <link rel="icon" type="image/png" href="/src/assets/logo.png" />
  <title>Graylinx — THERMYNX | Operations Intelligence</title>

  <!-- No-flash color-mode: set the .dark class + brand BEFORE first paint so
       there's no light→dark flicker on reload. Mirrors ColorModeProvider. -->
  <script>
    (function () {
      try {
        var mode = localStorage.getItem('thermynx-color-mode') || 'light';
        if (mode === 'dark') document.documentElement.classList.add('dark');
      } catch (e) { /* storage disabled — default light */ }
    })();
  </script>

  <!-- First-paint styles: applied synchronously BEFORE the bundled CSS loads
       (in dev, index.css is injected by the JS module). Without this the page
       briefly shows an unstyled, visible "Skip to main content" link on a
       white/black flash until React mounts. Mirrors index.css canvas + skip-link. -->
  <style>
    html { background: #EFF0FF; color-scheme: light; }
    html.dark { background: #0A0E1F; color-scheme: dark; }
    .skip-link {
      position: absolute; top: -100%; left: 1rem; z-index: 9999;
      padding: .5rem 1rem; background: #1F3FFE; color: #fff;
      font-weight: 600; font-size: 13px; text-decoration: none;
      border-radius: 0 0 8px 8px;
    }
    .skip-link:focus { top: 0; }
  </style>

  <!-- Inter · Plus Jakarta Sans · JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
