services:

  # ── Core data services ───────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: thermynx_app
      POSTGRES_USER: thermynx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    ports:
      - "5442:5432"   # host 5442 — avoids clash with other Postgres stacks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermynx -d thermynx_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped   # survive Docker resource pressure / other-stack churn

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # host 6380 — avoids default Redis if already bound
    command: redis-server --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped   # survive Docker resource pressure / other-stack churn

  # Web UI — browse keys / TTL / pub-sub ( http://localhost:8081 )
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8181:8081"   # host 8181 — avoids clash with ClimaStream Airflow (8080) / other UIs
    environment:
      REDIS_HOSTS: "local:redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Observability stack (optional — start with: docker compose --profile obs up -d) ──

  prometheus:
    image: prom/prometheus:v2.47.0
    profiles: [obs]
    ports:
      - "9292:9090"   # host 9292 — 9090 ghost-held by Docker Desktop WSL2 proxy
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus.alerts.yml:/etc/prometheus/prometheus.alerts.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach backend running on host
    restart: unless-stopped
    depends_on: [alertmanager]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: [obs]
    ports:
      - "9394:9093"   # host 9394 — 9093 ghost-held by Docker Desktop WSL2 proxy
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    profiles: [obs]
    user: "0"   # root — avoids volume ownership issues on Docker Desktop for Windows
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    profiles: [obs]
    ports:
      - "9080:9080"
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Backend log file (uvicorn on host writes here when LOG_FILE is set in backend/.env)
      - ./logs:/var/log/graylinx:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.0
    profiles: [obs]
    ports:
      - "3030:3000"   # host 3030 — native grafana.exe service holds 3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus, loki]
    restart: unless-stopped

  # ── Langfuse — self-hosted LLM tracing (MIT license) ─────────────────────────
  # Open-source span-level observability. Traces every LLM call, tool call,
  # postcheck and critique pass. Zero data egress — runs entirely on-prem.
  # Dashboard: http://localhost:3200
  # Docs: https://langfuse.com/docs/deployment/self-host
  langfuse:
    image: langfuse/langfuse:latest
    profiles: [obs]          # start with: docker compose --profile obs up -d
    ports:
      - "3200:3000"
    environment:
      DATABASE_URL: postgresql://thermynx:${POSTGRES_PASSWORD:-dev}@postgres:5432/thermynx_app
      NEXTAUTH_URL:    http://localhost:3200
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-langfuse-secret}
      SALT:            ${LANGFUSE_SALT:-changeme-langfuse-salt}
      # Pre-seed a project so the backend can connect without manual UI setup
      LANGFUSE_INIT_PROJECT_NAME:       thermynx
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-thermynx-dev}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-thermynx-dev}
      LANGFUSE_INIT_ORG_NAME:           graylinx
      TELEMETRY_ENABLED: "false"   # no phone-home
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  loki_data:
  grafana_data:
  alertmanager_data:
