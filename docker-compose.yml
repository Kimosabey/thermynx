services:

  # ── Core data services ───────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: thermynx_app
      POSTGRES_USER: thermynx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    ports:
      - "5442:5432"   # host 5442 — avoids clash with other Postgres stacks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermynx -d thermynx_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped   # survive Docker resource pressure / other-stack churn

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # host 6380 — avoids default Redis if already bound
    command: redis-server --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped   # survive Docker resource pressure / other-stack churn

  # Web UI — browse keys / TTL / pub-sub ( http://localhost:8081 )
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8181:8081"   # host 8181 — avoids clash with ClimaStream Airflow (8080) / other UIs
    environment:
      REDIS_HOSTS: "local:redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Observability stack (optional — start with: docker compose --profile obs up -d) ──

  prometheus:
    image: prom/prometheus:v2.47.0
    profiles: [obs]
    ports:
      - "9292:9090"   # host 9292 — 9090 ghost-held by Docker Desktop WSL2 proxy
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus.alerts.yml:/etc/prometheus/prometheus.alerts.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach backend running on host
    restart: unless-stopped
    depends_on: [alertmanager]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: [obs]
    ports:
      - "9394:9093"   # host 9394 — 9093 ghost-held by Docker Desktop WSL2 proxy
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    profiles: [obs]
    user: "0"   # root — avoids volume ownership issues on Docker Desktop for Windows
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    profiles: [obs]
    ports:
      - "9080:9080"
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Backend log file (uvicorn on host writes here when LOG_FILE is set in backend/.env)
      - ./logs:/var/log/graylinx:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.0
    profiles: [obs]
    ports:
      - "3030:3000"   # host 3030 — native grafana.exe service holds 3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # To install plugins persistently, uncomment and list them separated by commas:
      # GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-clock-panel"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus, loki]
    restart: unless-stopped

  # ── Langfuse — self-hosted LLM tracing (MIT license) — CURRENTLY DISABLED ────
  # Deferred until the 48 GB GPU box. The single-container Langfuse only exists
  # on v2, whose SDK is incompatible with langchain 1.x (used by the LangGraph
  # rewrite). The langchain-1.x-compatible SDK (v4.7.1, installed) requires the
  # Langfuse *v3* server, which is NOT single-container — it needs ClickHouse +
  # Redis + S3/MinIO + a worker (5+ services). That's the heavy stack we're not
  # standing up on the shared box yet.
  #
  # Tracing degrades safely: graph_callbacks() in app/ai/graph/tracing.py returns
  # [] whenever LANGFUSE_HOST is unset (the default), so the backend runs
  # identically without it. Prometheus/Grafana/Loki (obs profile) are unaffected.
  #
  # To restore later: drop in the official Langfuse v3 self-host stack
  # (https://langfuse.com/self-hosting/docker-compose) — langfuse-web +
  # langfuse-worker + clickhouse + minio + redis, all under `profiles: [obs]` —
  # then set LANGFUSE_HOST/PUBLIC_KEY/SECRET_KEY in backend/.env. The v4 SDK +
  # the graph CallbackHandler then trace with zero code changes.
  #
  # langfuse:                       # v3 server — see note above before re-enabling
  #   image: langfuse/langfuse:3
  #   profiles: [obs]
  #   ports: ["3200:3000"]
  #   environment: { ...DATABASE_URL, CLICKHOUSE_*, REDIS_*, LANGFUSE_S3_*, ENCRYPTION_KEY... }
  #   depends_on: [postgres, clickhouse, redis, minio]

volumes:
  postgres_data:
  loki_data:
  grafana_data:
  alertmanager_data:
